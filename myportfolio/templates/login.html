<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="/static/image/png" href="background/logo.png"><!--link icon-->
    <link rel="stylesheet" href="/static/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6C63FF;
            --accent: #4CAF50;
            --bg-dark: #0f172a;
        }

    </style>
    
</head>
<body>
    <!-- Show Django messages -->
    {% if messages %}
    {% for message in messages %}
        <div class="alert {% if message.tags %}{{ message.tags }}{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
    <div class="login-container">

     <div class="login-wraper">
            <div class="lms">
                <div class="logo">
                    <img src="/static/background/logo.png" alt="">
                </div> 
                <p>Smart Learn</p>
        
             </div>
            <form  onsubmit="validationForm()" method="post">
                {% csrf_token %}
                <div class="input-box">
                    <label for="email" class="form-label">Email Addresses</label>
                    <input type="email" name="email" id="email" placeholder="majid@gmail.com" value="{{email}}">
                </div>
                <div class="input-box">
                    <label for="password" class="form-label">Password <a href="#">Forgot?</a></label>
                    <input type="password" name="password" id="password" placeholder="Password" value="{{password}}">
                </div>
                <div class="btn">
                    <button type="submit">Login</button>
                </div>
                <div class="forgot-box">  
                    <p><span>New here?</span><a href="/signup/">Create an account</a> </p> 
                </div>
                  
                
            </form>
        </div>
    </div>
   <script>
    function validationForm(){
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (email === "" || !email.includes("@")) {
        alert('Please Enter Email');
      }
      
      else if(password === ''){
        alert('Please Enter Password');
      }
      
      
    }
   
   </script>
</body>
</html>
