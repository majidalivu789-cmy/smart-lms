<script src="/static/dashboards.js?v=20260405-3"></script>
<script>
function toggleMobileSidebar(forceClose) {
    const body = document.body;
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.querySelector('.sidebar-overlay');

    if (!sidebar || !overlay) return;

    if (window.innerWidth > 799) {
        overlay.classList.remove('active');
        body.classList.remove('sidebar-open-mobile');
        return;
    }

    if (forceClose === true) {
        sidebar.classList.add('close');
    } else {
        sidebar.classList.toggle('close');
    }

    const isOpen = !sidebar.classList.contains('close');
    overlay.classList.toggle('active', isOpen);
    body.classList.toggle('sidebar-open-mobile', isOpen);
}

document.addEventListener('DOMContentLoaded', function () {
    const sidebar = document.querySelector('.sidebar');
    const mobileBtn = document.querySelector('.mobile-sidebar-toggle');
    const overlay = document.querySelector('.sidebar-overlay');
    if (mobileBtn) mobileBtn.dataset.externalToggle = 'true';
    if (overlay) overlay.dataset.externalToggle = 'true';
    if (window.innerWidth <= 799 && sidebar) sidebar.classList.add('close');
    toggleMobileSidebar(true);
});

window.addEventListener('resize', function () {
    if (window.innerWidth > 799) {
        toggleMobileSidebar(true);
    }
});
</script>
